<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"/></head>
<body>
  <h1 id="status">step 1: html loaded</h1>
  <script>
    document.getElementById("status").textContent = "step 2: inline script works";
  </script>
  <script src="/socket.io/socket.io.js" 
    onload="document.getElementById('status').textContent='step 3: socket.io loaded'" 
    onerror="document.getElementById('status').textContent='ERROR: socket.io failed'">
  </script>
  <script src="https://unpkg.com/@discord/embedded-app-sdk@1.2.0/output/index.js"
    onload="document.getElementById('status').textContent='step 4: SDK loaded — window keys: '+Object.keys(window).filter(k=>k.toLowerCase().includes('discord')).join(', ')"
    onerror="document.getElementById('status').textContent='ERROR: SDK failed to load'">
  </script>
</body>
</html>
